<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Gesture Tracker — Mathisha</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  h1 {
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: #00ff88;
    padding: 8px 0 4px;
    text-transform: uppercase;
  }

  #container {
    position: relative;
    width: 640px;
    max-width: 100vw;
    flex: 1;
  }

  video { display: none; }

  canvas#output {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Big centered message overlay */
  #gesture-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  #gesture-overlay .emo {
    font-size: 4rem;
    line-height: 1;
    filter: drop-shadow(0 0 12px #00ff88cc);
  }

  #gesture-overlay .msg {
    margin-top: 10px;
    font-size: 2rem;
    font-weight: bold;
    font-family: 'Arial Black', sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #fff;
    /* neon highlight effect */
    text-shadow:
      0 0 8px currentColor,
      0 0 20px currentColor,
      0 0 40px currentColor;
    padding: 8px 20px;
    border-radius: 10px;
    background: rgba(0,0,0,0.45);
  }

  /* Color per gesture */
  .color-hi    { color: #00ff88; }
  .color-good  { color: #ffcc00; }
  .color-math  { color: #ff66ff; }
  .color-like  { color: #ff4466; }
  .color-sus   { color: #ff6600; }
  .color-none  { color: #ffffff; }

  /* No hand */
  #no-hand {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #333355;
    pointer-events: none;
  }
  #no-hand .big { font-size: 3rem; }
  #no-hand .msg { font-size: 0.75rem; letter-spacing: 0.2em; margin-top: 8px; }

  /* Loading */
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #00ff88;
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid #003322;
    border-top-color: #00ff88;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Bottom bar */
  #info-bar {
    width: 640px;
    max-width: 100vw;
    background: #0d0d1a;
    border-top: 2px solid #00ff88;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 58px;
  }

  #bar-icon { font-size: 2rem; min-width: 40px; text-align: center; }

  #bar-text { flex: 1; }
  #bar-name {
    font-size: 1.1rem;
    font-weight: bold;
    color: #00ff88;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #bar-desc { font-size: 0.72rem; color: #7777aa; margin-top: 2px; }

  /* Finger dots */
  #finger-status { display: flex; gap: 6px; }
  .finger-dot {
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    font-size: 0.52rem; color: #444466;
    letter-spacing: 0.04em;
  }
  .finger-dot .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #1a1a2e;
    border: 1px solid #334;
    transition: all 0.1s;
  }
  .finger-dot.up .dot {
    background: #00ff88;
    border-color: #00ff88;
    box-shadow: 0 0 6px #00ff88;
  }
  .finger-dot.up { color: #00ff88; }

  /* Gesture cheat sheet */
  #cheatsheet {
    width: 640px;
    max-width: 100vw;
    background: #08080f;
    border-top: 1px solid #1a1a2e;
    display: flex;
    justify-content: space-around;
    padding: 5px 8px;
  }
  .cs-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.65rem; color: #555577;
  }
  .cs-item span { font-size: 1rem; }
</style>
</head>
<body>

<h1>✋ Hand Gesture Tracker — Mathisha Edition</h1>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="output"></canvas>

  <!-- Big overlay in center of stream -->
  <div id="gesture-overlay" style="display:none">
    <div class="emo" id="ov-emo"></div>
    <div class="msg" id="ov-msg"></div>
  </div>

  <div id="no-hand" style="display:none">
    <div class="big">🖐</div>
    <div class="msg">NO HAND DETECTED</div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size:0.78rem;letter-spacing:0.2em">LOADING MEDIAPIPE…</div>
  </div>
</div>

<!-- Bottom bar -->
<div id="info-bar">
  <div id="bar-icon">—</div>
  <div id="bar-text">
    <div id="bar-name">Waiting…</div>
    <div id="bar-desc">Show your hand to the camera</div>
  </div>
  <div id="finger-status">
    <div class="finger-dot" id="dot-thumb"><div class="dot"></div>THUMB</div>
    <div class="finger-dot" id="dot-index"><div class="dot"></div>INDEX</div>
    <div class="finger-dot" id="dot-middle"><div class="dot"></div>MID</div>
    <div class="finger-dot" id="dot-ring"><div class="dot"></div>RING</div>
    <div class="finger-dot" id="dot-pinky"><div class="dot"></div>PINKY</div>
  </div>
</div>

<!-- Cheat sheet -->
<div id="cheatsheet">
  <div class="cs-item"><span>🖐️</span> HI</div>
  <div class="cs-item"><span>🤙</span> GOOD</div>
  <div class="cs-item"><span>👍</span> THIS IS MATHISHA</div>
  <div class="cs-item"><span>✊</span> I LIKE YOU</div>
  <div class="cs-item"><span>🤜</span> A SUS FILE</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ── Landmark short names ─────────────────────────────────────────────────────
const LANDMARK_SHORT = [
  'WRIST',
  'T-CMC','T-MCP','T-IP','T-TIP',
  'I-MCP','I-PIP','I-DIP','I-TIP',
  'M-MCP','M-PIP','M-DIP','M-TIP',
  'R-MCP','R-PIP','R-DIP','R-TIP',
  'P-MCP','P-PIP','P-DIP','P-TIP'
];

// ── Your custom gesture messages ─────────────────────────────────────────────
const GESTURES = {
  // key: fingers string "TIMRP"
  // Open hand (all up)
  '11111': { icon: '🖐️', msg: 'HI',             color: 'hi',   desc: 'Open hand — Hello!' },
  // Hang loose thumb+pinky
  '10001': { icon: '🤙', msg: 'GOOD',            color: 'good', desc: 'Hang loose — Good vibes!' },
  // Thumbs up
  '10000': { icon: '👍', msg: 'THIS IS MATHISHA', color: 'math', desc: 'Thumbs up — This is Mathisha!' },
  // Fist
  '00000': { icon: '✊', msg: 'I LIKE YOU',      color: 'like', desc: 'Fist — I like you!' },
  // Forward fist / punch — index+middle+ring+pinky closed, thumb in = fist forward
  // We'll detect "fist forward" same as fist but with extra check
  // Peace sign used as placeholder for 🤜
  '01100': { icon: '🤜', msg: 'A SUS FILE',      color: 'sus',  desc: 'Fist bump — A sus file! 📁' },
};

const DEFAULT = { icon: '🤚', msg: '', color: 'none', desc: 'Unknown gesture' };

// ── DOM refs ─────────────────────────────────────────────────────────────────
const video   = document.getElementById('video');
const canvas  = document.getElementById('output');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('gesture-overlay');
const ovEmo   = document.getElementById('ov-emo');
const ovMsg   = document.getElementById('ov-msg');
const noHand  = document.getElementById('no-hand');
const loading = document.getElementById('loading');

const barIcon = document.getElementById('bar-icon');
const barName = document.getElementById('bar-name');
const barDesc = document.getElementById('bar-desc');

const fingerDots = {
  thumb:  document.getElementById('dot-thumb'),
  index:  document.getElementById('dot-index'),
  middle: document.getElementById('dot-middle'),
  ring:   document.getElementById('dot-ring'),
  pinky:  document.getElementById('dot-pinky'),
};

// ── Finger detection ─────────────────────────────────────────────────────────
function isThumbUp(lm)         { return lm[4].x < lm[3].x; }
function isFingerUp(lm, t, p)  { return lm[t].y < lm[p].y; }

function getFingers(lm) {
  return [
    isThumbUp(lm)          ? 1 : 0,
    isFingerUp(lm, 8, 6)   ? 1 : 0,
    isFingerUp(lm, 12, 10) ? 1 : 0,
    isFingerUp(lm, 16, 14) ? 1 : 0,
    isFingerUp(lm, 20, 18) ? 1 : 0,
  ];
}

// ── Connections ──────────────────────────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

// ── Draw landmarks + names ───────────────────────────────────────────────────
function drawHand(lm, w, h) {
  // Lines
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 2.5;
  for (const [a, b] of CONNECTIONS) {
    ctx.beginPath();
    ctx.moveTo(lm[a].x * w, lm[a].y * h);
    ctx.lineTo(lm[b].x * w, lm[b].y * h);
    ctx.stroke();
  }

  // Dots + labels
  for (let i = 0; i < lm.length; i++) {
    const x = lm[i].x * w;
    const y = lm[i].y * h;

    // Red dot
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#ff3355';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    const label = LANDMARK_SHORT[i];
    ctx.font = 'bold 10px Courier New';
    const tw = ctx.measureText(label).width;
    const lx = x + 8, ly = y - 4;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(lx - 2, ly - 10, tw + 6, 14);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(label, lx + 1, ly);
  }
}

// ── Update overlay ───────────────────────────────────────────────────────────
let lastKey = '';

function updateOverlay(fingers, detected) {
  if (!detected) {
    overlay.style.display = 'none';
    noHand.style.display  = 'block';
    barIcon.textContent = '—';
    barName.textContent = 'NO HAND';
    barDesc.textContent = 'Show your hand to the camera';
    Object.values(fingerDots).forEach(el => el.classList.remove('up'));
    lastKey = '';
    return;
  }

  noHand.style.display = 'none';

  const key  = fingers.join('');
  const g    = GESTURES[key] || DEFAULT;

  // Update finger dots
  const keys = ['thumb','index','middle','ring','pinky'];
  fingers.forEach((f, i) => fingerDots[keys[i]].classList.toggle('up', f === 1));

  // Bottom bar
  barIcon.textContent = g.icon;
  barName.textContent = g.msg || key;
  barDesc.textContent = g.desc;

  // Overlay — only update if gesture changed
  if (key !== lastKey) {
    lastKey = key;
    if (g.msg) {
      ovEmo.textContent = g.icon;
      ovMsg.textContent = g.msg;
      // Set color class
      ovMsg.className = 'msg color-' + g.color;
      overlay.style.display = 'block';
    } else {
      overlay.style.display = 'none';
    }
  }
}

// ── MediaPipe ────────────────────────────────────────────────────────────────
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5,
});

hands.onResults(results => {
  loading.style.display = 'none';
  const w = canvas.width, h = canvas.height;

  // Draw mirrored camera
  ctx.save();
  ctx.scale(-1, 1);
  ctx.translate(-w, 0);
  ctx.drawImage(results.image, 0, 0, w, h);
  ctx.restore();

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];
    const mirrored = lm.map(p => ({ x: 1 - p.x, y: p.y, z: p.z }));
    drawHand(mirrored, w, h);
    const fingers = getFingers(lm);
    updateOverlay(fingers, true);
  } else {
    updateOverlay([], false);
  }
});

// ── Camera ───────────────────────────────────────────────────────────────────
const camera = new Camera(video, {
  onFrame: async () => {
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    await hands.send({ image: video });
  },
  width: 640,
  height: 480,
});

camera.start().catch(err => {
  loading.innerHTML = `<div style="color:#ff3355;font-size:0.8rem;padding:10px">
    ⚠️ Camera Error: ${err.message}<br><br>
    <span style="color:#888;font-size:0.7rem">Open via http://localhost instead of file://</span>
  </div>`;
});
</script>
</body>
</html>
